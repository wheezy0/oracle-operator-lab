# This rule is not used by the project oracle-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to oracle.dboperator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: oracle-operator
    app.kubernetes.io/managed-by: kustomize
  name: oracledatabase-viewer-role
rules:
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases/status
  verbs:
  - get
