# This rule is not used by the project oracle-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over oracle.dboperator.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: oracle-operator
    app.kubernetes.io/managed-by: kustomize
  name: oracledatabase-admin-role
rules:
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases
  verbs:
  - '*'
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases/status
  verbs:
  - get
