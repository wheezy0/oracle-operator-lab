---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases/finalizers
  verbs:
  - update
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases/status
  verbs:
  - get
  - patch
  - update
