# This rule is not used by the project oracle-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the oracle.dboperator.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: oracle-operator
    app.kubernetes.io/managed-by: kustomize
  name: oracledatabase-editor-role
rules:
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - oracle.dboperator.io
  resources:
  - oracledatabases/status
  verbs:
  - get
