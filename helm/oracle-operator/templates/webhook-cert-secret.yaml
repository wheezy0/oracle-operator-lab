apiVersion: v1
kind: Secret
metadata:
  name: oracle-operator-webhook-tls
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "oracle-operator.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ required "webhook.tls.crt is required — run: bash helm/generate-certs.sh" .Values.webhook.tls.crt }}
  tls.key: {{ required "webhook.tls.key is required — run: bash helm/generate-certs.sh" .Values.webhook.tls.key }}
