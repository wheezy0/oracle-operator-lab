apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oracle-operator
  labels:
    {{- include "oracle-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oracle-operator
subjects:
  - kind: ServiceAccount
    name: oracle-operator
    namespace: {{ .Values.namespace }}
