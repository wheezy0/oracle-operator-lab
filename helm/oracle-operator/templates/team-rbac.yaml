{{- if .Values.teams.enabled }}
{{- range .Values.teams.list }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oracle-dba
  namespace: {{ .name }}
rules:
  - apiGroups: ["oracle.dboperator.io"]
    resources: ["oracledatabases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["oracle.dboperator.io"]
    resources: ["oracledatabases/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oracle-dba-{{ .user }}
  namespace: {{ .name }}
subjects:
  - kind: User
    name: {{ .user }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: oracle-dba
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
